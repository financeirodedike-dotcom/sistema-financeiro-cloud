<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar - Sistema Financeiro</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Arial, sans-serif; background: #eef4f8; color: #172033; }
    .box { width: min(420px, calc(100% - 32px)); background: white; border: 1px solid #d8dee9; border-radius: 8px; padding: 24px; }
    h1 { margin: 0 0 6px; color: #12355b; }
    p { margin: 0 0 18px; color: #667085; }
    form { display: grid; gap: 10px; }
    input, button { padding: 11px 12px; border: 1px solid #d8dee9; border-radius: 6px; font-size: 15px; }
    button { background: #0f766e; color: white; font-weight: 700; cursor: pointer; }
    a { color: #0f766e; font-weight: 700; text-decoration: none; }
    .foot { margin-top: 14px; font-size: 14px; }
  </style>
</head>
<body>
  <section class="box">
    <h1>Sistema Financeiro</h1>
    <p>Entre para acessar sua empresa.</p>
    <form action="/login" method="post">
      <input type="email" name="email" placeholder="E-mail" required>
      <input type="password" name="password" placeholder="Senha" required>
      <button type="submit">Entrar</button>
    </form>
    <div class="foot">Primeiro acesso? <a href="/register">Criar conta</a></div>
  </section>
</body>
</html>
