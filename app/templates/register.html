<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Criar conta - Business360 AI</title>
  <style>
    :root { --blue: #12355b; --teal: #0f766e; --line: #d9e2ec; --text: #111827; --muted: #64748b; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Inter, "Segoe UI", Arial, sans-serif; background: radial-gradient(circle at 20% 20%, rgba(76,201,240,.18), transparent 26rem), linear-gradient(120deg, #061522, #12355b 58%, #0b7fab); color: var(--text); padding: 24px; }
    .box { width: min(500px, 100%); background: rgba(255,255,255,.98); border: 1px solid rgba(255,255,255,.48); border-radius: 14px; padding: 28px; box-shadow: 0 24px 60px rgba(6,21,34,.28); }
    h1 { margin: 0 0 6px; color: var(--blue); font-size: 27px; letter-spacing: -.02em; }
    p { margin: 0 0 20px; color: var(--muted); }
    form { display: grid; gap: 11px; }
    input, button { padding: 12px 13px; border: 1px solid var(--line); border-radius: 8px; font-size: 15px; }
    input:focus { outline: 2px solid rgba(15,118,110,.16); border-color: var(--teal); }
    button { background: linear-gradient(180deg, #0d9488, var(--teal)); color: white; font-weight: 800; cursor: pointer; border: 0; box-shadow: 0 10px 22px rgba(15,118,110,.2); }
    a { color: var(--teal); font-weight: 800; text-decoration: none; }
    .foot { margin-top: 16px; font-size: 14px; color: var(--muted); }
  </style>
</head>
<body>
  <section class="box">
    <h1>Criar acesso Business360 AI</h1>
    <p>Seu usuario sera dono da primeira empresa cadastrada.</p>
    <form action="/register" method="post">
      <input name="name" placeholder="Seu nome" required>
      <input type="email" name="email" placeholder="E-mail" required>
      <input type="password" name="password" placeholder="Senha" required minlength="6">
      <input name="company_name" placeholder="Nome da empresa" required>
      <input name="document" placeholder="CNPJ ou CPF da empresa">
      <button type="submit">Criar conta</button>
    </form>
    <div class="foot">Ja tenho acesso. <a href="/login">Entrar</a></div>
  </section>
</body>
</html>
